name: Clojure CI Lint

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:

    runs-on: ubuntu-latest

    env: # Environment variable for the entire job
      CI_ENV: true

    steps:
      - uses: actions/checkout@v6
      - name: Set up Java 21
        uses: actions/setup-java@v5
        with:
          java-version: 21
          distribution: 'temurin'
      - uses: DeLaGuardo/setup-clojure@master
        with:
          cli: latest
      - name: Formatting
        run:  clojure -M:cljfmt check
      - name: Linting
        run: clojure -M:clj-kondo --lint src --lint test --lint dev
